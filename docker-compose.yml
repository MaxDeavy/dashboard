services:
  dashboard:
    build: .
    # Für Nutzer ohne lokalen Build: docker-compose.image.yml (GHCR-Image)
    ports:
      - "${PORT:-3333}:${PORT:-3333}"
    env_file:
      - .env
    environment:
      # Überschreibt PORT aus .env – App muss auf demselben Port lauschen wie das Mapping
      PORT: ${PORT:-3333}
      HOSTNAME: 0.0.0.0
    volumes:
      - ./data:/app/data
    #  - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    # Optional: Zugriff auf Docker-Socket-Proxy im Netzwerk
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  # Optional: Docker Socket Proxy (sicherer als direkter Socket-Mount)
  # docker-socket-proxy:
  #   image: tecnativa/docker-socket-proxy
  #   environment:
  #     CONTAINERS: 1
  #     IMAGES: 1
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   restart: unless-stopped
